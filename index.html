<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden Tracker — Bella Vista, AR</title>
  <meta name="description" content="Blended indoor garden tracker — DWC hydro, soil seedlings, bonsai, hardening off, grow logs, pH/EC tracking. Bella Vista, AR Zone 6b.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <div id="top-header">
    <div>
      <h1>🌱 Garden Tracker</h1>
      <p>Bella Vista, AR · Zone 6b · Last frost ~Apr 20 · Safe planting ~Apr 27</p>
    </div>
    <div class="header-btns">
      <span id="save-msg">saved</span>
      <button class="btn btn-sm" onclick="exportData()">Export</button>
      <label class="btn btn-sm" style="cursor:pointer">
        Import <input type="file" accept=".json" style="display:none" onchange="importData(event)">
      </label>
    </div>
  </div>

  <div id="wx-summary"></div>
    <div id="weather-panel">
    <div style="padding:14px 18px;color:var(--text3);font-size:12px">Loading weather for Bella Vista, AR…</div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div id="filter-bar"></div>
      <div id="plant-list"></div>
    </div>
    <div id="detail">
      <div class="empty-detail">← Select a plant to view details</div>
    </div>
  </div>

</div>
<script src="js/app.js"></script>
</body>
</html>
